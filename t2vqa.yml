name: T2VQA
num_epochs: 60
warmup_epochs: 2.5
save_model: true
batch_size: 4
num_workers: 8
split_seed: 1

wandb:
    project_name: T2VQA

data:   
    train:
        type: T2VDataset
        args:
            phase: train
            anno_file: /data/TeamMember/lm/sy/project/info.txt
            data_prefix: /data/TeamMember/lm/sy/project/T2VQA-DB
            size: 224
            clip_len: 8
            frame_interval: 2

    eval:
        type: T2VDataset
        args:
            phase: test
            anno_file: /data/TeamMember/lm/sy/project/info.txt
            data_prefix: /data/TeamMember/lm/sy/project/T2VQA-DB
            size: 224
            clip_len: 8
            frame_interval: 2

    t2v:
        type: T2VDataset
        args:
            phase: test
            anno_file: /data/TeamMember/lm/sy/project/info.txt
            data_prefix: /data/TeamMember/lm/sy/project/T2VQA-DB
            size: 224
            clip_len: 8
            frame_interval: 2

model:
    args:
        
        image_size: 224
        clip_len: 8  
        dropout: 0.1
        nlayers: 6
        embed_dim: 256 
        llm_model: /home/sy/.cache/modelscope/hub/models/LLM-Research/Meta-Llama-3-8B-Instruct
        blip2_model: /data/TeamMember/lm/sy/project/goldsj/blip2-opt-2.7b
        swin_weights: /data/TeamMember/lm/sy/project/models/swin_tiny_patch244_window877_kinetics400_1k.pth
        conv_weights: /data/TeamMember/lm/sy/project/models/convnext_3d_tiny_3.pth
        bert_weights: /data/TeamMember/lm/sy/project/models/bert-base-uncased
    
        use_lora: true
        lora_r: 16
        lora_alpha: 32
        
        
        use_vision_lora: true       
        vision_lora_r: 16          
        vision_lora_alpha: 32
        
optimizer:
    lr: !!float 1e-5
    wd: 0.05
        
test_load_path: "/data/TeamMember/lm/sy/project/models/T2VQA-main/pretrained_weights/threeBranch.pth"